# Workspace-wide cargo configuration. Iteration speed in dev (opt-level=1)
# so debug builds stay fast on the 22M-param ONNX models we exercise; full
# LTO + opt 3 in release for the binaries we benchmark and ship.
[build]
# Reasonable default parallelism without thrashing the user's machine.
jobs = 8

[profile.dev]
opt-level = 1
debug = true
incremental = true

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
debug = "line-tables-only"
strip = "debuginfo"

# pyo3 extension-module: undefined Python symbols are resolved by the
# host interpreter at load time, not by the static linker. macOS needs
# this opt-in; Linux ld already does the right thing by default.
[target.'cfg(target_os = "macos")']
rustflags = [
    "-C",
    "link-args=-Wl,-undefined,dynamic_lookup",
]
